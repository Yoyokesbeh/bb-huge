{% extends "base.html" %}
{% block title %}Edit Recon Entry{% endblock %}

{% block content %}
<div class="container" style="max-width:600px">
  <div class="page-header">
    <a href="{{ url_for('programs.detail', pid=entry.program_id) }}#recon"
       class="text-muted" style="font-size:13px;text-decoration:none">← Back to Program</a>
    <div class="page-title" style="margin-top:6px">Edit Recon Entry</div>
  </div>
  <div class="card">
    <form method="POST">
      <div class="form-group">
        <label for="category">Category</label>
        <select id="category" name="category">
          {% for c in categories %}
          <option value="{{ c }}" {{ 'selected' if entry.category == c }}>{{ c }}</option>
          {% endfor %}
        </select>
      </div>
      <div class="form-group">
        <label for="value">Value *</label>
        <input type="text" id="value" name="value" required value="{{ entry.value }}">
      </div>
      <div class="form-group">
        <label for="source">Source</label>
        <input type="text" id="source" name="source" value="{{ entry.source or '' }}"
               placeholder="tool or agent name">
      </div>
      <div class="form-group">
        <label for="notes">Notes</label>
        <textarea id="notes" name="notes" rows="3"
                  style="resize:vertical">{{ entry.notes or '' }}</textarea>
      </div>
      <div style="display:flex;gap:10px;margin-top:8px">
        <button type="submit" class="btn btn-primary">Save</button>
        <a href="{{ url_for('programs.detail', pid=entry.program_id) }}#recon" class="btn btn-ghost">Cancel</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
